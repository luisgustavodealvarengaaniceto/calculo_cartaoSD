services:
  calculo-sd:
    build: .
    container_name: calculo-sd
    ports:
      - "8084:8084"
    restart: unless-stopped
    environment:
      - TZ=America/Sao_Paulo
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8084/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
